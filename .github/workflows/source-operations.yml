# 자격증봄 공식 데이터의 일일 검증·이상 감지·단일 운영 이슈를 자동화한다.
name: Source operations

on:
  schedule:
    - cron: "23 2 * * *"
  workflow_dispatch:
  repository_dispatch:
    types: [certbom-source-sync]

permissions:
  contents: write
  issues: write

concurrency:
  group: certbom-source-operations
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1
        with:
          version: 9.15.9
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm source:verify
      - run: pnpm source:simulate
      - name: Q-Net 현재·다음 연도 수집과 anomaly gate
        id: sync
        continue-on-error: true
        env:
          QNET_SERVICE_KEY: ${{ secrets.QNET_SERVICE_KEY }}
        run: node scripts/source-operations.mjs sync --publish --strict --output source-operation.json
      - name: last-known-good 변경만 자동 반영
        if: always()
        shell: bash
        run: |
          if git diff --quiet -- ops/source-registry/last-known-good; then
            exit 0
          fi
          git config user.name "robom-operations"
          git config user.email "operations@robom.kr"
          git add ops/source-registry/last-known-good
          git commit -m "data: refresh Q-Net last-known-good [skip ci]"
          git push origin HEAD:main
      - name: 장애·외부 차단은 중복 없는 이슈 하나로 승격
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          STATUS="$(jq -r '.status // "ERROR"' source-operation.json 2>/dev/null || echo ERROR)"
          TITLE="[ops] 자격증봄 공식 데이터 동기화 확인 필요"
          EXISTING="$(gh issue list --state open --search "$TITLE in:title" --json number --jq '.[0].number // empty')"
          if [ "$STATUS" = "PASS" ]; then
            if [ -n "$EXISTING" ]; then
              gh issue close "$EXISTING" --comment "정상 동기화가 복구되어 자동으로 닫습니다. 실행: $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"
            fi
            exit 0
          fi
          BODY="$(jq -r '"상태: `\(.status // "ERROR")`\n\n사유: \(.reason // ((.anomalies // []) | join("; ")) // "workflow 로그 확인")\n\n실행: '"$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"'"' source-operation.json 2>/dev/null || printf 'workflow 결과 파일을 읽지 못했습니다.\n\n실행: %s/%s/actions/runs/%s' "$GITHUB_SERVER_URL" "$GITHUB_REPOSITORY" "$GITHUB_RUN_ID")"
          if [ -n "$EXISTING" ]; then
            gh issue edit "$EXISTING" --body "$BODY"
          else
            gh issue create --title "$TITLE" --body "$BODY" --label "operations" 2>/dev/null || gh issue create --title "$TITLE" --body "$BODY"
          fi
      - name: 검토 필요 상태는 workflow도 실패 처리
        if: steps.sync.outcome == 'failure'
        run: exit 1

# immutable 중앙 workflow로 CertBom 패밀리 생성물과 PWA 계약을 검사한다.
name: Family contract

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  family-contract:
    uses: robom-labs/robom/.github/workflows/family-contract.yml@5a63eab4f6930837f9877efd187562b85530a81a
    with:
      generated-dir: apps/web/src/generated/robom-family
      lock-file: family.lock.json
      manifest-file: apps/web/pwa-manifest.json

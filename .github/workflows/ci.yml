# 자격증봄의 타입, 코드 품질, 테스트, 빌드, 브라우저 흐름을 배포 전에 검증한다.
name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - name: 공식 source registry와 400일 시간 이동 검사
        run: pnpm source:verify && pnpm source:simulate
      - run: pnpm build
      - name: Android·iOS 네이티브 검증
        run: pnpm --filter @certbom/mobile check
      - name: Production dependency audit
        run: pnpm audit:prod
      - run: pnpm --filter @certbom/web exec playwright install --with-deps chromium webkit
      - run: pnpm test:e2e

  <rect width="1200" height="630" fill="#fffaf0"/>
  <rect x="70" y="64" width="1060" height="502" rx="64" fill="#ffffff" stroke="#dbe3ff" stroke-width="4"/>
  <rect x="120" y="116" width="112" height="112" rx="32" fill="#2457ef"/>
  <path d="M151 145h50v54l-25-16-25 16z" fill="#fffaf0"/>
